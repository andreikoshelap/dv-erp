# /etc/nginx/sites-available/api.gatto-piccolo.com
# Canonical Laravel block. certbot will add the 443 block + redirect.
server {
    listen 80;
    server_name api.gatto-piccolo.com;

    root /var/www/gatto/api/public;
    index index.php;

    charset utf-8;
    client_max_body_size 20M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        # adjust the socket to your installed PHP (run: ls /run/php/)
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # the agent calls Anthropic — give it room so the request isn't cut off
        fastcgi_read_timeout 120;
    }

    location ~ /\.(?!well-known).* { deny all; }
}
