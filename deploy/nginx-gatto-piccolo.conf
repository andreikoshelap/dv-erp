# /etc/nginx/sites-available/gatto-piccolo.com
# Angular dashboard (static SPA). certbot will add the 443 block + redirect.
server {
    listen 80;
    server_name gatto-piccolo.com www.gatto-piccolo.com;

    root /var/www/gatto/dashboard;   # Angular build output (the browser/ folder)
    index index.html;

    # SPA: unknown paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # long cache for fingerprinted assets
    location ~* \.(?:js|css|woff2?|svg|png|jpg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
